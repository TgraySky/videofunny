<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch — StreamVibe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #14120f;
      color: #f2ebe3;
      min-height: 100vh;
      line-height: 1.45;
    }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid rgba(242, 235, 227, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f2ebe3;
      text-decoration: none;
    }
    .brand span { color: #e8a54b; }
    .back {
      font-family: system-ui, sans-serif;
      font-size: 0.85rem;
      color: rgba(242, 235, 227, 0.65);
      text-decoration: none;
    }
    .back:hover { color: #e8a54b; }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }
    .player {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #000;
      margin-bottom: 1.25rem;
    }
    .player iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    h1 {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    .more {
      font-family: system-ui, sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(242, 235, 227, 0.45);
      margin-bottom: 0.75rem;
    }
    .related {
      display: grid;
      gap: 0.6rem;
    }
    .related a {
      color: #f2ebe3;
      text-decoration: none;
      font-size: 0.95rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(242, 235, 227, 0.08);
    }
    .related a:hover { color: #e8a54b; }
    .error {
      padding: 2rem 0;
      color: rgba(242, 235, 227, 0.7);
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="index.html">Stream<span>Vibe</span></a>
    <a class="back" href="index.html">← All videos</a>
  </header>

  <main id="app"></main>

  <script src="videos.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get("v");
    const video = getVideoById(id);
    const app = document.getElementById("app");

    if (!video) {
      app.innerHTML = `<p class="error">Video not found. <a href="index.html" style="color:#e8a54b">Back to list</a></p>`;
    } else {
      document.title = video.title + " — StreamVibe";
      const others = VIDEOS.filter((v) => v.id !== video.id);
      app.innerHTML = `
        <div class="player">
          <iframe src="${video.embed}" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>
        <h1>${video.title}</h1>
        <div class="more">More videos</div>
        <div class="related">
          ${others.map((v) => `<a href="watch.html?v=${encodeURIComponent(v.id)}">${v.title}</a>`).join("")}
        </div>
      `;
    }
  </script>
</body>
</html>
